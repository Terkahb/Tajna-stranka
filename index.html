<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Tajná zpráva</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  color: #3b2f2f;
  background: linear-gradient(135deg, #f5e6d3, #e8d8c3);
  overflow: hidden;
}

/* ❤️ SRDÍČKA (více + náhodný pohyb) */
.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  z-index: 0;
  overflow: hidden;
}

.bg span {
  position: absolute;
  font-size: 60px;
  opacity: 0.3;
  color: #ff4d6d;
  animation: floatRandom linear infinite;
}

/* náhodné plutí */
@keyframes floatRandom {
  0% {
    transform: translate(0, 100vh);
  }
  25% {
    transform: translate(40px, 60vh);
  }
  50% {
    transform: translate(-30px, 20vh);
  }
  75% {
    transform: translate(30px, -40vh);
  }
  100% {
    transform: translate(-20px, -120vh);
  }
}

/* BOX */
.box {
  position: relative;
  z-index: 2;
  background: rgba(255,255,255,0.65);
  backdrop-filter: blur(8px);
  padding: 30px;
  border-radius: 16px;
  text-align: center;
  width: 320px;
  box-shadow: 0 0 20px rgba(0,0,0,0.15);
  animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.8); }
  to { opacity: 1; transform: scale(1); }
}

h2 {
  font-weight: normal;
}

/* INPUT */
input {
  padding: 10px;
  border-radius: 10px;
  border: none;
  width: 80%;
  text-align: center;
  margin-top: 10px;
}

/* BUTTON */
button {
  margin-top: 12px;
  padding: 10px 18px;
  border: none;
  border-radius: 10px;
  background: #8c6a5d;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #6f5248;
}

/* 🔓 ANIMACE ODEMKNUTÍ */
#zprava {
  margin-top: 20px;
  display: none;
  color: #3b2f2f;
  font-weight: bold;
  animation: unlock 1.2s ease;
}

@keyframes unlock {
  0% { opacity: 0; transform: scale(0.5); }
  60% { opacity: 1; transform: scale(1.15); }
  100% { transform: scale(1); }
}

/* 🎉 CONFETTI */
canvas {
  position: absolute;
  top: 0;
  left: 0;
  pointer-events: none;
  z-index: 3;
}
</style>
</head>

<body>

<!-- ❤️ VÍCE SRDÍČEK -->
<div class="bg">
  <span style="left:2%; animation-duration:12s;">❤️</span>
  <span style="left:6%; animation-duration:14s;">❤️</span>
  <span style="left:10%; animation-duration:10s;">❤️</span>
  <span style="left:14%; animation-duration:16s;">❤️</span>
  <span style="left:18%; animation-duration:11s;">❤️</span>
  <span style="left:22%; animation-duration:13s;">❤️</span>
  <span style="left:26%; animation-duration:9s;">❤️</span>
  <span style="left:30%; animation-duration:15s;">❤️</span>
  <span style="left:34%; animation-duration:12s;">❤️</span>
  <span style="left:38%; animation-duration:14s;">❤️</span>
  <span style="left:42%; animation-duration:10s;">❤️</span>
  <span style="left:46%; animation-duration:16s;">❤️</span>
  <span style="left:50%; animation-duration:11s;">❤️</span>
  <span style="left:54%; animation-duration:13s;">❤️</span>
  <span style="left:58%; animation-duration:9s;">❤️</span>
  <span style="left:62%; animation-duration:15s;">❤️</span>
  <span style="left:66%; animation-duration:12s;">❤️</span>
  <span style="left:70%; animation-duration:14s;">❤️</span>
  <span style="left:74%; animation-duration:10s;">❤️</span>
  <span style="left:78%; animation-duration:16s;">❤️</span>
  <span style="left:82%; animation-duration:11s;">❤️</span>
  <span style="left:86%; animation-duration:13s;">❤️</span>
  <span style="left:90%; animation-duration:9s;">❤️</span>
  <span style="left:94%; animation-duration:15s;">❤️</span>
</div>

<canvas id="confetti"></canvas>

<div class="box">
  <h2>Zadej vyluštěnou šifru:</h2>

  <input id="heslo" placeholder="...">
  <br>
  <button onclick="zkontroluj()">Odemknout</button>

  <div id="zprava">
    🎂☕ Sejdeme se v 16:00!
  </div>
</div>

<script>

/* 🔐 kontrola */
function zkontroluj() {
  let h = document.getElementById("heslo").value;

  if (h.toLowerCase() === "kafe") {
    document.getElementById("zprava").style.display = "block";
    startConfetti();
  } else {
    alert("Špatná šifra!");
  }
}

/* 🎉 confetti */
function startConfetti() {
  const canvas = document.getElementById("confetti");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let pieces = [];

  for (let i = 0; i < 120; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      r: Math.random() * 5 + 2,
      speed: Math.random() * 3 + 2
    });
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#ff6b81";

    pieces.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();

      p.y += p.speed;
      if (p.y > canvas.height) p.y = -10;
    });

    requestAnimationFrame(draw);
  }

  draw();
}

</script>

</body>
</html>
