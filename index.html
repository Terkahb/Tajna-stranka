<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tajná zpráva</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #f5e6d3, #e8d8c3);
  overflow: hidden;
  color: #3b2f2f;
}

.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
}

.bg span {
  position: absolute;
  font-size: 30px;
  opacity: 0.25;
  color: #ff4d6d;
  animation: float 10s linear infinite;
}

@keyframes float {
  0% { transform: translateY(110vh); }
  100% { transform: translateY(-20vh); }
}

.box {
  position: relative;
  z-index: 2;
  background: rgba(255,255,255,0.7);
  padding: 25px;
  border-radius: 16px;
  text-align: center;
  width: 90%;
  max-width: 340px;
}

.text-box {
  background: rgba(140,106,93,0.25);
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 10px;
}

input {
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
  width: 90%;
  text-align: center;
  font-size: 16px;
}

button {
  margin-top: 12px;
  padding: 12px;
  width: 90%;
  border: none;
  border-radius: 10px;
  background: #8c6a5d;
  color: white;
  font-size: 16px;
}

/* ✅ opravené tlačítko */
.next-btn {
  display: none;
  margin-top: 15px;
  padding: 12px;
  width: 90%;
  border-radius: 10px;
  background: #6f5248;
  color: white;
  text-decoration: none;
}

#zprava {
  margin-top: 15px;
  display: none;
  font-weight: bold;
}

#lock {
  font-size: 60px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="bg" id="hearts"></div>

<div class="box">

  <div id="lock">🔒</div>

  <div class="text-box" id="textBox">
    <h2 id="title">Zadej místo 📍</h2>
    <span id="note">(malá písmena a bez mezer)</span>
  </div>

  <input id="input">
  <button onclick="check()">Odemknout</button>

  <div id="zprava"></div>

  <a href="https://terkahb.github.io/Ukoly/" class="next-btn" id="nextBtn">
    Další úkol 💌
  </a>

</div>

<script>

/* srdíčka */
const hearts = document.getElementById("hearts");
for (let i = 0; i < 40; i++) {
  let s = document.createElement("span");
  s.innerHTML = "❤️";
  s.style.left = Math.random()*100 + "%";
  s.style.animationDuration = (6 + Math.random()*10) + "s";
  hearts.appendChild(s);
}

let step = 1;

function check() {
  let val = document.getElementById("input").value.toLowerCase();

  if (step === 1) {
    if (val === "labohemacafe") {
      step = 2;
      document.getElementById("title").innerText = "Zadej čas 🕰️";
      document.getElementById("note").innerText = "(digitálně)";
      document.getElementById("input").value = "";
    } else alert("Špatné heslo!");
  }

  else if (step === 2) {
    if (val === "16:00") {

      document.getElementById("lock").innerText = "🔓";
      document.getElementById("textBox").style.display = "none";

      document.getElementById("zprava").style.display = "block";
      document.getElementById("zprava").innerText =
        "Lásule moje, budu se na tebe těšit v 16:00 v La Bohéma Cafe! ❤️";

      document.getElementById("input").style.display = "none";
      document.querySelector("button").style.display = "none";

      /* ✅ zobraz tlačítko */
      document.getElementById("nextBtn").style.display = "block";

    } else alert("Špatný čas!");
  }
}
</script>

</body>
</html>
