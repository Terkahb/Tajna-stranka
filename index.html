<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tajná zpráva</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #f5e6d3, #e8d8c3);
  overflow: hidden;
  color: #3b2f2f;
}

/* ❤️ SRDÍČKA */
.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  z-index: 0;
}

.bg span {
  position: absolute;
  font-size: 30px;
  opacity: 0.25;
  color: #ff4d6d;
  animation: float 10s linear infinite;
}

@keyframes float {
  0% { transform: translateY(110vh); }
  100% { transform: translateY(-20vh); }
}

/* BOX */
.box {
  position: relative;
  z-index: 2;
  background: rgba(255,255,255,0.65);
  backdrop-filter: blur(8px);
  padding: 25px;
  border-radius: 16px;
  text-align: center;
  width: 90%;
  max-width: 340px;
  box-shadow: 0 0 20px rgba(0,0,0,0.15);
}

/* TEXT BOX */
.text-box {
  background: rgba(140,106,93,0.25);
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 10px;
}

h2 { margin: 0; font-size: 18px; }

.note {
  display: block;
  font-size: 12px;
  opacity: 0.7;
  margin-top: 5px;
}

/* INPUT */
input {
  padding: 10px;
  border-radius: 10px;
  border: none;
  width: 90%;
  text-align: center;
  margin-top: 10px;
  font-size: 16px;
}

/* BUTTON */
button {
  margin-top: 12px;
  padding: 10px;
  width: 90%;
  border: none;
  border-radius: 10px;
  background: #8c6a5d;
  color: white;
  cursor: pointer;
}

/* ZPRÁVA */
#zprava {
  margin-top: 15px;
  display: none;
  font-weight: bold;
  animation: pop 1s ease;
}

@keyframes pop {
  0% { transform: scale(0.5); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

/* 🔐 ZÁMEK */
#lock {
  font-size: 60px;
  margin-bottom: 10px;
  transition: 0.6s ease;
}

.open {
  transform: rotate(20deg) scale(1.2);
  color: #6f5248;
}

/* 🎆 PRSKAVKY */
.spark {
  position: absolute;
  width: 6px;
  height: 6px;
  background: gold;
  border-radius: 50%;
  animation: burst 1s ease-out forwards;
}

@keyframes burst {
  0% { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
}
</style>
</head>

<body>

<div class="bg" id="hearts"></div>

<div class="box">

  <div id="lock">🔒</div>

  <div class="text-box">
    <h2 id="title">Zadej místo 📍</h2>
    <span class="note">(digitálně)</span>
  </div>

  <input id="input">
  <button onclick="check()">Odemknout</button>

  <div id="zprava"></div>
</div>

<script>

/* ❤️ srdíčka */
const hearts = document.getElementById("hearts");

for (let i = 0; i < 40; i++) {
  let s = document.createElement("span");
  s.innerHTML = "❤️";
  s.style.left = Math.random()*100 + "%";
  s.style.animationDuration = (6 + Math.random()*10) + "s";
  hearts.appendChild(s);
}

/* 🔊 zvuk */
function playSound() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.type = "sine";
  osc.frequency.setValueAtTime(660, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.3);

  gain.gain.setValueAtTime(0.2, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.start();
  osc.stop(ctx.currentTime + 0.4);
}

/* 🎆 prskavky */
function sparks() {
  for (let i = 0; i < 25; i++) {
    const s = document.createElement("div");
    s.className = "spark";
    s.style.left = "50%";
    s.style.top = "40%";

    const x = (Math.random() - 0.5) * 300 + "px";
    const y = (Math.random() - 0.5) * 300 + "px";

    s.style.setProperty("--x", x);
    s.style.setProperty("--y", y);

    document.body.appendChild(s);

    setTimeout(() => s.remove(), 1000);
  }
}

let step = 1;

function check() {
  let val = document.getElementById("input").value.toLowerCase();

  if (step === 1) {
    if (val === "la bohema cafe") {
      step = 2;
      document.getElementById("title").innerText = "Zadej čas 🕰️";
      document.getElementById("input").value = "";
    } else alert("Špatné heslo!");
  }

  else if (step === 2) {
    if (val === "16:00") {

      /* 🔓 animace zámku */
      document.getElementById("lock").classList.add("open");

      /* 🔊 zvuk */
      playSound();

      /* 🎆 prskavky */
      sparks();

      document.getElementById("zprava").style.display = "block";
      document.getElementById("zprava").innerHTML =
        "Lásule moje, budu se na tebe těšit v 16:00 v La Bohéma Cafe! ❤️";

      document.getElementById("input").style.display = "none";
      document.querySelector("button").style.display = "none";
      document.getElementById("title").style.display = "none";

    } else alert("Špatný čas!");
  }
}
</script>

</body>
</html>
