<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tajná zpráva</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  color: #3b2f2f;
  background: linear-gradient(135deg, #f5e6d3, #e8d8c3);
  overflow: hidden;
}

/* ❤️ SRDÍČKA (víc + random styl) */
.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  z-index: 0;
  overflow: hidden;
}

.bg span {
  position: absolute;
  font-size: calc(30px + (var(--size) * 1px));
  opacity: 0.25;
  color: #ff4d6d;
  animation: floatRandom linear infinite;
  animation-duration: calc(8s + (var(--speed) * 1s));
  animation-delay: calc(var(--delay) * -1s);
}

@keyframes floatRandom {
  0% { transform: translate(0, 110vh); }
  25% { transform: translate(30px, 60vh); }
  50% { transform: translate(-20px, 20vh); }
  75% { transform: translate(25px, -40vh); }
  100% { transform: translate(-10px, -120vh); }
}

/* BOX */
.box {
  position: relative;
  z-index: 2;
  background: rgba(255,255,255,0.65);
  backdrop-filter: blur(8px);
  padding: 25px;
  border-radius: 16px;
  text-align: center;
  width: 90%;
  max-width: 340px;
  box-shadow: 0 0 20px rgba(0,0,0,0.15);
  animation: fadeIn 1.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.8); }
  to { opacity: 1; transform: scale(1); }
}

h2 {
  font-weight: normal;
  font-size: 18px;
}

/* INPUT */
input {
  padding: 10px;
  border-radius: 10px;
  border: none;
  width: 90%;
  text-align: center;
  margin-top: 10px;
  font-size: 16px;
}

/* BUTTON */
button {
  margin-top: 12px;
  padding: 10px 18px;
  border: none;
  border-radius: 10px;
  background: #8c6a5d;
  color: white;
  cursor: pointer;
  width: 90%;
}

button:hover {
  background: #6f5248;
}

/* 🔓 ZPRÁVA */
#zprava {
  margin-top: 15px;
  display: none;
  color: #3b2f2f;
  font-weight: bold;
  animation: unlock 1s ease;
}

@keyframes unlock {
  0% { opacity: 0; transform: scale(0.5); }
  60% { opacity: 1; transform: scale(1.15); }
  100% { transform: scale(1); }
}
</style>
</head>

<body>

<!-- ❤️ SRDÍČKA GENEROVANÁ -->
<div class="bg" id="hearts"></div>

<div class="box">
  <h2 id="title">Zadej místo 📍 (malá písmena a mezery):</h2>

  <input id="input" placeholder="...">
  <br>
  <button onclick="check()">Odemknout</button>

  <div id="zprava"></div>
</div>

<script>

/* ❤️ generování srdíček */
const hearts = document.getElementById("hearts");

for (let i = 0; i < 40; i++) {
  let s = document.createElement("span");

  s.innerHTML = "❤️";
  s.style.left = Math.random() * 100 + "%";
  s.style.top = Math.random() * 100 + "%";

  s.style.setProperty("--size", Math.random() * 40);
  s.style.setProperty("--speed", Math.random() * 10);
  s.style.setProperty("--delay", Math.random() * 10);

  hearts.appendChild(s);
}

/* 🔐 krok 1 + krok 2 */
let step = 1;

function check() {
  let val = document.getElementById("input").value.toLowerCase();
  let title = document.getElementById("title");
  let output = document.getElementById("zprava");

  /* STEP 1 */
  if (step === 1) {
    if (val === "la bohema cafe") {
      step = 2;
      title.innerText = "Zadej čas 🕰️ (digitálně):";
      document.getElementById("input").value = "";
    } else {
      alert("Špatné heslo!");
    }
  }

  /* STEP 2 */
  else if (step === 2) {
    if (val === "16:00") {
      output.style.display = "block";
      output.innerHTML = "Lásule moje, budu se na tebe těšit v 16:00 v La Bohéma Cafe! ❤️";
      document.getElementById("input").style.display = "none";
      document.querySelector("button").style.display = "none";
      title.style.display = "none";
    } else {
      alert("Špatný čas!");
    }
  }
}

</script>

</body>
</html>
